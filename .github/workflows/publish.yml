name: Publish to NPM

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies for @atp-protocol/spec
        run: cd packages/spec && npm ci

      - name: Run @atp-protocol/spec tests
        run: cd packages/spec && npm test

      - name: Publish @atp-protocol/spec to NPM
        run: cd packages/spec && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release summary
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.releases.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
              body: context.payload.release.body + '\n\n## Published\n- `@atp-protocol/spec@' + context.payload.release.tag_name.replace(/^v/, '') + '` published to NPM'
            });
